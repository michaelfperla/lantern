name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: mingw-w64-x86_64-gcc make

      - name: Build recon tools
        run: make all

      - name: Build attack tools
        run: make attack

      - name: Verify zero warnings
        run: |
          make clean
          make all attack CFLAGS="-O2 -Wall -Wextra -Werror"

      - name: Upload artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: lantern-${{ github.ref_name }}
          path: '*.exe'
